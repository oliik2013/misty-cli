name: Test misty-cli

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y curl grep findutils chafa

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run misty-cli
        run: |
          chmod +x misty-cli.sh
          # Debug: check network & dependencies
          curl -s --max-time 10 "https://starnumber.vercel.app/misty?web=1" | head -5
          which chafa
          head -1 /dev/urandom | chafa --help 2>&1 | head -3
          # Run script
          ./misty-cli.sh 2>&1 | head -5 || echo "Script failed with: $?"
